<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Content Security Policy - allows local network connections for development -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: wss: ws:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob: http://localhost:* http://127.0.0.1:*; media-src 'self' blob: https://*.r2.dev https:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https: wss: ws:; frame-src https://accounts.google.com https://*.firebaseapp.com https://*.r2.dev;" />
    <title>TeleDesk</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TeleDesk" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Node.js shims required by simple-peer — must run before any ES module -->
    <script>
      window.global = window.global || window;
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      window.process.version = window.process.version || 'v18.0.0';
      window.process.browser = true;
      if (!window.process.nextTick) {
        window.process.nextTick = function (fn) {
          var args = Array.prototype.slice.call(arguments, 1);
          return Promise.resolve().then(function () { fn.apply(null, args); });
        };
      }
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = { isBuffer: function() { return false; } };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
