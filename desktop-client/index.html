<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: wss: ws:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob: http://localhost:*; media-src 'self' blob:; connect-src 'self' http://localhost:* ws://localhost:* https: wss: ws:; frame-src https://accounts.google.com https://*.firebaseapp.com;" />
    <title>TeleDesk</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Node.js shims required by simple-peer — must run before any ES module -->
    <script>
      window.global = window.global || window;
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      window.process.version = window.process.version || 'v18.0.0';
      window.process.browser = true;
      if (!window.process.nextTick) {
        window.process.nextTick = function (fn) {
          var args = Array.prototype.slice.call(arguments, 1);
          return Promise.resolve().then(function () { fn.apply(null, args); });
        };
      }
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = { isBuffer: function() { return false; } };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
